{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center text-center mt-5 mb-5">
    <div class="col-md-8">
        <div class="card shadow-sm border-danger">
            <div class="card-header bg-danger text-white">
                <h4 class="card-title mb-0">Maak je Dating Profiel aan</h4>    
            </div>
            <div class="card-body">
                <form method="POST">

                    <div class="mb-3">
                        <label for="naam" class="form-label">Je voornaam</label>
                        <input type="text" class="form-control" id="naam" name="naam" required>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="leeftijd" class="form-label">Leeftijd</label>
                            <input type="number" class="form-control" id="leeftijd" name="leeftijd" min="18" max="100" required>
                        </div>
                    </div>    
                        <div class="col-md-6">
                            <label for="geslacht" class="form-label">Ik ben een...</label>
                            <select name="geslacht" id="geslacht" class="form-select" required>
                                <option value="" disabled selected>Kies een optie</option>
                                <option value="Man">Man</option>
                                <option value="Vrouw">Vrouw</option>
                                <option value="Anders">Anders</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="foto_url" class="form-label">Link naar je profielfoto (URL)</label>
                        <input type="url" class="form-control" id="foto_url" name="foto_url" placeholder="https://voorbeeld.nl/foto.jpg" required>
                        <div class="form-text">Zorg dat het een geldige link is (begint met http of https).</div>
                    </div>

                    <div class="mb-3">
                        <label for="bio" class="form-label">Vertel iets over jezelf</label>
                        <textarea class="form-control" id="bio" name="bio" rows="4" maxlength="1000" required></textarea>
                    </div>

                    <button type="submit" class="btn btn-danger w-100 btn-lg">Profiel Opslaan & Rondkijken!</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
